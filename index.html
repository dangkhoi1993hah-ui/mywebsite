<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đăng Khôi Shop</title>

<style>
body{
margin:0;
font-family:Arial;
background:#111827;
color:white;
text-align:center;
}

.container{
max-width:400px;
margin:auto;
padding:20px;
}

img{
width:120px;
height:120px;
border-radius:50%;
border:4px solid #00e5ff;
box-shadow:0 0 20px #00e5ff;
}

h1{
color:#00e5ff;
text-shadow:0 0 15px #00e5ff;
}

a{
display:block;
margin:15px;
padding:15px;
background:#1e293b;
color:white;
text-decoration:none;
border-radius:15px;
transition:0.3s;
}

a:hover{
background:#00e5ff;
color:black;
transform:scale(1.05);
}
</style>

</head>

<body>

<div class="container">

<img src="avatar.jpg">

<h1>Đăng Khôi Shop</h1>

<p>khôi tập dev web</p>

<a href="#">Facebook</a>

<a href="#">Zalo</a>

<a href="#">Telegram</a>

</div>

</body>
</html>
